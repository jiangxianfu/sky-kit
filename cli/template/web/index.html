<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title><<<name>>> — AI Robot</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #21262d;
      --border: #30363d;
      --text: #c9d1d9;
      --text-dim: #6e7681;
      --accent: #58a6ff;
      --accent2: #3fb950;
      --user-bg: #1c2333;
      --bot-bg: #161b22;
      --danger: #f85149;
      --warn: #d29922;
      --radius: 12px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-mono: "JetBrains Mono", "Fira Code", Consolas, monospace;
    }
    html, body { height: 100%; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 12px;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #58a6ff, #3fb950);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .bot-info h1 { font-size: 16px; font-weight: 600; color: #e6edf3; }
    .bot-info .subtitle { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-dim); display: inline-block; margin-right: 4px;
      transition: background 0.3s;
    }
    .status-dot.online { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
    .status-dot.error { background: var(--danger); }

    .header-right { display: flex; align-items: center; gap: 8px; }
    .btn {
      padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--bg3); color: var(--text); font-size: 12px;
      cursor: pointer; transition: all 0.15s;
    }
    .btn:hover { background: #30363d; border-color: var(--accent); color: var(--accent); }
    .btn.danger:hover { border-color: var(--danger); color: var(--danger); }
    .session-badge {
      font-size: 11px; color: var(--text-dim); background: var(--bg3);
      padding: 4px 8px; border-radius: 6px; border: 1px solid var(--border);
      font-family: var(--font-mono); max-width: 180px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── Main Layout ── */
    main { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    aside {
      width: 240px; background: var(--bg2); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0;
      transition: width 0.3s;
    }
    @media (max-width: 700px) { aside { display: none; } }
    .sidebar-section { padding: 12px; border-bottom: 1px solid var(--border); }
    .sidebar-section h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 8px; }
    .info-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .info-label { font-size: 12px; color: var(--text-dim); }
    .info-value { font-size: 12px; color: var(--text); font-family: var(--font-mono); text-align: right; }
    .skill-tag {
      display: inline-block; font-size: 11px; padding: 2px 6px;
      background: rgba(88,166,255,0.1); border: 1px solid rgba(88,166,255,0.3);
      border-radius: 4px; color: var(--accent); margin: 2px;
    }
    .memory-text {
      font-size: 11px; color: var(--text-dim); line-height: 1.5;
      max-height: 80px; overflow-y: auto;
    }

    /* ── Chat Container ── */
    .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Message Bubbles ── */
    .message { display: flex; gap: 10px; max-width: 860px; }
    .message.user { flex-direction: row-reverse; align-self: flex-end; }
    .message.bot  { align-self: flex-start; }
    .avatar {
      width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 14px;
    }
    .message.user .avatar { background: linear-gradient(135deg, #58a6ff44, #3fb95044); border: 1px solid var(--accent); color: var(--accent); }
    .message.bot  .avatar { background: linear-gradient(135deg, #58a6ff22, #3fb95022); border: 1px solid var(--border); }
    .bubble {
      padding: 10px 14px; border-radius: var(--radius); font-size: 14px;
      line-height: 1.6; max-width: 680px; word-break: break-word;
    }
    .message.user .bubble {
      background: rgba(88,166,255,0.12); border: 1px solid rgba(88,166,255,0.25);
      border-bottom-right-radius: 4px;
    }
    .message.bot .bubble {
      background: var(--bg2); border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* ── Markdown in bubbles ── */
    .bubble p { margin-bottom: 8px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble h1,.bubble h2,.bubble h3 { margin: 10px 0 6px; color: #e6edf3; }
    .bubble ul,.bubble ol { padding-left: 20px; margin-bottom: 8px; }
    .bubble li { margin-bottom: 4px; }
    .bubble code {
      font-family: var(--font-mono); font-size: 12px;
      background: var(--bg3); padding: 1px 5px; border-radius: 4px;
      border: 1px solid var(--border); color: #e3b341;
    }
    .bubble pre {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px; overflow-x: auto; margin: 8px 0;
    }
    .bubble pre code {
      background: none; border: none; padding: 0; color: var(--text); font-size: 13px;
    }
    .bubble blockquote {
      border-left: 3px solid var(--accent); padding-left: 10px;
      color: var(--text-dim); margin: 6px 0; font-style: italic;
    }
    .bubble strong { color: #e6edf3; }
    .bubble a { color: var(--accent); text-decoration: none; }
    .bubble a:hover { text-decoration: underline; }
    .bubble hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
    .bubble table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 12px; }
    .bubble th,.bubble td { border: 1px solid var(--border); padding: 6px 10px; }
    .bubble th { background: var(--bg3); color: #e6edf3; }

    /* Tool call badge */
    .tool-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; color: var(--warn);
      background: rgba(210,153,34,0.1); border: 1px solid rgba(210,153,34,0.3);
      border-radius: 4px; padding: 2px 6px; margin: 2px 0;
    }

    /* Typing indicator */
    .typing { display: flex; align-items: center; gap: 4px; padding: 8px 0; }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim);
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* Timestamp */
    .msg-meta { font-size: 10px; color: var(--text-dim); margin-top: 4px; padding: 0 2px; }
    .message.user .msg-meta { text-align: right; }

    /* ── Input Area ── */
    .input-area {
      padding: 12px 16px; background: var(--bg2);
      border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .input-row {
      display: flex; gap: 8px; align-items: flex-end;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 12px; padding: 8px 12px;
      transition: border-color 0.15s;
    }
    .input-row:focus-within { border-color: var(--accent); }
    textarea {
      flex: 1; background: none; border: none; outline: none; resize: none;
      color: var(--text); font-family: var(--font); font-size: 14px;
      line-height: 1.5; min-height: 22px; max-height: 120px;
      overflow-y: auto;
    }
    textarea::placeholder { color: var(--text-dim); }
    .send-btn {
      width: 32px; height: 32px; border-radius: 8px; border: none;
      background: var(--accent); color: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0;
      transition: opacity 0.15s, transform 0.1s;
    }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .input-hint { font-size: 11px; color: var(--text-dim); margin-top: 6px; text-align: center; }

    /* ── System message ── */
    .system-msg {
      text-align: center; font-size: 12px; color: var(--text-dim);
      padding: 4px 0;
    }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 16px; font-size: 13px; color: var(--text);
      opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 100;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────── -->
<header>
  <div class="header-left">
    <div class="logo">🤖</div>
    <div class="bot-info">
      <h1 id="botName"><<<name>>></h1>
      <div class="subtitle"><span class="status-dot" id="statusDot"></span><span id="statusText">连接中…</span></div>
    </div>
  </div>
  <div class="header-right">
    <div class="session-badge" id="sessionBadge" title="当前会话 ID">新会话</div>
    <button class="btn" onclick="newSession()">🔄 新对话</button>
    <button class="btn danger" onclick="clearMessages()">🗑 清屏</button>
  </div>
</header>

<!-- ── Main ───────────────────────────────────────── -->
<main>
  <!-- Sidebar -->
  <aside>
    <div class="sidebar-section">
      <h3>服务信息</h3>
      <div class="info-row"><span class="info-label">模型</span><span class="info-value" id="infoModel">—</span></div>
      <div class="info-row"><span class="info-label">运行时间</span><span class="info-value" id="infoUptime">—</span></div>
      <div class="info-row"><span class="info-label">消息总数</span><span class="info-value" id="infoMsgs">—</span></div>
    </div>
    <div class="sidebar-section">
      <h3>技能</h3>
      <div id="skillTags"><span style="color:var(--text-dim);font-size:12px">加载中…</span></div>
    </div>
    <div class="sidebar-section" style="flex:1">
      <h3>记忆摘要</h3>
      <div class="memory-text" id="memoryText">加载中…</div>
    </div>
  </aside>

  <!-- Chat Area -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="system-msg">✨ 与 <strong id="botNameInline">AI Robot</strong> 开始对话</div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="inputBox" placeholder="输入消息… (Enter 发送，Shift+Enter 换行)" rows="1"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="发送 (Enter)">
          ➤
        </button>
      </div>
      <div class="input-hint">由 <span id="hintModel">AI</span> 提供支持 · Web UI</div>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
// ── 配置 ──────────────────────────────────────────────────────────────
const API = window.location.origin; // 同源 API
let sessionId = null;
let botName = "AI";
let isStreaming = false;

// ── 工具函数 ─────────────────────────────────────────────────────────
function toast(msg, dur = 2500) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), dur);
}

function formatUptime(secs) {
  if (secs < 60) return `${Math.floor(secs)}秒`;
  if (secs < 3600) return `${Math.floor(secs/60)}分${Math.floor(secs%60)}秒`;
  return `${Math.floor(secs/3600)}时${Math.floor((secs%3600)/60)}分`;
}

function now() {
  return new Date().toLocaleTimeString("zh-CN", {hour:"2-digit",minute:"2-digit"});
}

// ── 简易 Markdown 渲染 ────────────────────────────────────────────────
function renderMarkdown(text) {
  // Code blocks
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const escaped = code.trim().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    return `<pre><code class="lang-${lang}">${escaped}</code></pre>`;
  });
  // Inline code
  text = text.replace(/`([^`]+)`/g, "<code>$1</code>");
  // Bold
  text = text.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
  // Italic
  text = text.replace(/\*(.*?)\*/g, "<em>$1</em>");
  // Strikethrough
  text = text.replace(/~~(.*?)~~/g, "<del>$1</del>");
  // Links
  text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  // Headings
  text = text.replace(/^### (.+)$/gm, "<h3>$1</h3>");
  text = text.replace(/^## (.+)$/gm, "<h2>$1</h2>");
  text = text.replace(/^# (.+)$/gm, "<h1>$1</h1>");
  // Blockquote
  text = text.replace(/^> (.+)$/gm, "<blockquote>$1</blockquote>");
  // Horizontal rule
  text = text.replace(/^---$/gm, "<hr>");
  // Unordered list
  text = text.replace(/^\s*[-*] (.+)$/gm, "<li>$1</li>");
  text = text.replace(/(<li>.*<\/li>\n?)+/g, s => `<ul>${s}</ul>`);
  // Ordered list
  text = text.replace(/^\d+\. (.+)$/gm, "<li>$1</li>");
  // Paragraphs (double newline)
  text = text.replace(/\n\n/g, "</p><p>");
  // Single newline → <br>
  text = text.replace(/\n/g, "<br>");
  // Wrap in paragraph if not already block
  if (!/^<[hup]/.test(text.trim())) {
    text = `<p>${text}</p>`;
  }
  return text;
}

// ── 消息渲染 ─────────────────────────────────────────────────────────
function appendMessage(role, content, streaming = false) {
  const list = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = `message ${role}`;

  const avatar = document.createElement("div");
  avatar.className = "avatar";
  avatar.textContent = role === "user" ? "👤" : "🤖";

  const right = document.createElement("div");
  const bubble = document.createElement("div");
  bubble.className = "bubble";

  if (role === "bot") {
    if (streaming) {
      bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    } else {
      bubble.innerHTML = renderMarkdown(content);
    }
  } else {
    bubble.textContent = content;
  }

  const meta = document.createElement("div");
  meta.className = "msg-meta";
  meta.textContent = now();

  right.appendChild(bubble);
  right.appendChild(meta);

  if (role === "user") {
    div.appendChild(right);
    div.appendChild(avatar);
  } else {
    div.appendChild(avatar);
    div.appendChild(right);
  }

  list.appendChild(div);
  list.scrollTop = list.scrollHeight;
  return { div, bubble };
}

function appendSystem(text) {
  const list = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = "system-msg";
  div.innerHTML = text;
  list.appendChild(div);
  list.scrollTop = list.scrollHeight;
}

// ── 发送消息 ─────────────────────────────────────────────────────────
async function sendMessage() {
  if (isStreaming) return;
  const input = document.getElementById("inputBox");
  const text = input.value.trim();
  if (!text) return;

  input.value = "";
  input.style.height = "22px";

  // 显示用户消息
  appendMessage("user", text);

  // 显示 bot 正在思考
  const { div: botDiv, bubble: botBubble } = appendMessage("bot", "", true);
  isStreaming = true;
  document.getElementById("sendBtn").disabled = true;

  let fullReply = "";

  try {
    const params = new URLSearchParams({ message: text });
    if (sessionId) params.set("session_id", sessionId);

    const resp = await fetch(`${API}/api/chat/stream?${params.toString()}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";
    let firstChunk = true;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if (data.type === "chunk") {
            if (firstChunk) {
              botBubble.innerHTML = "";
              firstChunk = false;
            }
            fullReply += data.content;
            // 实时渲染 markdown
            botBubble.innerHTML = renderMarkdown(fullReply);
            document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
            if (!sessionId) sessionId = data.session_id;
          } else if (data.type === "done") {
            if (!sessionId) sessionId = data.session_id;
            if (sessionId) {
              document.getElementById("sessionBadge").textContent = sessionId.slice(-12);
              document.getElementById("sessionBadge").title = sessionId;
            }
          } else if (data.type === "error") {
            botBubble.innerHTML = `<span style="color:var(--danger)">⚠ ${data.content}</span>`;
          }
        } catch(e) {}
      }
    }
  } catch(e) {
    botBubble.innerHTML = `<span style="color:var(--danger)">✗ 无法连接服务: ${e.message}</span>`;
  }

  isStreaming = false;
  document.getElementById("sendBtn").disabled = false;
  input.focus();
  updateSidebar();
}

// ── 键盘事件 ─────────────────────────────────────────────────────────
document.getElementById("inputBox").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// 自动调整高度
document.getElementById("inputBox").addEventListener("input", function() {
  this.style.height = "22px";
  this.style.height = Math.min(this.scrollHeight, 120) + "px";
});

// ── 状态更新 ─────────────────────────────────────────────────────────
async function updateStatus() {
  try {
    const resp = await fetch(`${API}/api/status`);
    if (!resp.ok) throw new Error("offline");
    const data = await resp.json();

    botName = data.bot_name || "AI";
    document.getElementById("botName").textContent = botName;
    document.getElementById("botNameInline").textContent = botName;
    document.getElementById("hintModel").textContent = data.model || "AI";
    document.getElementById("statusDot").className = "status-dot online";
    document.getElementById("statusText").textContent = "在线";

    document.getElementById("infoModel").textContent = data.model || "—";
    document.getElementById("infoUptime").textContent = formatUptime(data.uptime_seconds || 0);
    document.getElementById("infoMsgs").textContent = data.message_count || 0;

    // Skills
    const skills = data.skills || [];
    const skillEl = document.getElementById("skillTags");
    if (skills.length) {
      skillEl.innerHTML = skills.map(s => `<span class="skill-tag">${s}</span>`).join("");
    } else {
      skillEl.innerHTML = '<span style="color:var(--text-dim);font-size:12px">无技能</span>';
    }
  } catch(e) {
    document.getElementById("statusDot").className = "status-dot error";
    document.getElementById("statusText").textContent = "离线";
  }
}

async function updateMemory() {
  try {
    const resp = await fetch(`${API}/api/memory`);
    const data = await resp.json();
    document.getElementById("memoryText").textContent = data.summary || "暂无记忆";
  } catch(e) {}
}

function updateSidebar() {
  updateStatus();
  updateMemory();
}

// ── 操作 ─────────────────────────────────────────────────────────────
function newSession() {
  sessionId = null;
  document.getElementById("sessionBadge").textContent = "新会话";
  document.getElementById("sessionBadge").title = "";
  appendSystem("🔄 <strong>新对话已开始</strong>");
  toast("新对话已开始");
}

function clearMessages() {
  const list = document.getElementById("messages");
  list.innerHTML = `<div class="system-msg">✨ 与 <strong id="botNameInline">${botName}</strong> 继续对话</div>`;
}

// ── 初始化 ─────────────────────────────────────────────────────────
updateSidebar();
setInterval(updateSidebar, 15000);
document.getElementById("inputBox").focus();
</script>
</body>
</html>
